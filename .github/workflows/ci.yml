# The whole suite runs against fakes (no Ghostty, no osascript, no USB), so a
# plain Linux runner covers it.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # `deck` pulls in the pure-Python streamdeck lib so the hardware-renderer
      # tests run (they only fake the USB device, not the image formatting).
      - run: pip install -e '.[dev,deck]'
      - run: pytest
